name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
          cache-disabled: true

      # ── Ripristina il keystore dal secret ─────────────────────────────────
      # Aggiungi questi 4 secret in GitHub → Settings → Secrets → Actions:
      #   KEYSTORE_BASE64  → output di: base64 -w 0 movile2bot.jks
      #   KEY_STORE_PASS   → password del keystore
      #   KEY_ALIAS        → alias della chiave
      #   KEY_PASS         → password della chiave
      # Per generare il keystore una volta sola (sul tuo PC):
      #   keytool -genkeypair -v -keystore movile2bot.jks -alias movile2bot \
      #     -keyalg RSA -keysize 2048 -validity 10000
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 --decode > $RUNNER_TEMP/release.jks
          file $RUNNER_TEMP/release.jks
          keytool -list -keystore $RUNNER_TEMP/release.jks -storepass "${{ secrets.KEY_STORE_PASS }}" -noprompt

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEY_STORE_PASS: ${{ secrets.KEY_STORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: gradle --no-build-cache assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: movile2-bot-v${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
